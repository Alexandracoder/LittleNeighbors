<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{password.title}">Reset your password</title>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
<h2 style="color: #e67e22;" th:text="#{password.title}">Password Recovery</h2>
<p th:text="#{password.body1}">You requested a password reset for your LittleNeighbors account. Click the button below to proceed:</p>

<div style="text-align: center; margin: 30px 0;">
    <a th:href="${resetLink}" style="background-color: #3498db; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;" th:text="#{password.button}">Reset Password</a>
</div>

<p style="font-size: 0.9em; color: #7f8c8d;" th:text="#{password.expiry}">If you did not request this, please ignore this email. This link will expire in 15 minutes.</p>
<br/>
<p th:text="#{welcome.regards}">Best regards,</p>
<strong th:text="#{welcome.team}">The LittleNeighbors Team</strong>
</body>
</html>
