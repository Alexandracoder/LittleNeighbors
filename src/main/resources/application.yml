# ===============================================================
# CONFIGURACIÓN GLOBAL
# ===============================================================
spring:
  jackson:
    mapper:
      default-view-inclusion: true
    deserialization:
      read-unknown-enum-values-as-null: true

jwt:
  expiration: 3600000

app:
  demo-mode: ${APP_DEMO_MODE:false}

---
# ===============================================================
# PERFIL DEV (Local)
# ===============================================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/littleneighbors_1?createDatabaseIfNotExist=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD:root}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:dev_secret_clave_temporal_123}

---
# ===============================================================
# PERFIL TEST (GitHub Actions / Local)
# ===============================================================
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/littleneighbors_test?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: testuser
    password: testpassword
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true
    clean-disabled: false
  test:
    database:
      replace: none

ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174

jwt:
  secret: "this-is-a-super-long-and-secure-test-secret-key-must-be-32-bytes"

---
# ===============================================================
# PERFIL PROD (Nube / Render)
# ===============================================================
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

spring:
  config:
    activate:
      on-profile: prod
  datasource:

    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    validate-on-migrate: false

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.web.access.intercept.FilterSecurityInterceptor: DEBUG
