# ===============================================================
# CONFIGURACIÓN GLOBAL
# ===============================================================
spring:
  profiles:
    active: dev
  jackson:
    mapper:
      default-view-inclusion: true
    deserialization:
      read-unknown-enum-values-as-null: true

jwt:
  expiration: 3600000

app:
  demo-mode: ${APP_DEMO_MODE:false}

---
# ===============================================================
# PERFIL DEV (Local)
# ===============================================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/littleneighbors_1?createDatabaseIfNotExist=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD:root}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:dev_secret_clave_temporal_123}

---
# ===============================================================
# PERFIL TEST (GitHub Actions / Local)
# ===============================================================
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/littleneighbors_test?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    # Cambia esto a valores fijos para el perfil de test
    username: testuser
    password: testpassword
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true
    ignore-migration-checksums: true
    validate-on-migrate: false
  test:
    database:
      replace: none

ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174

jwt:

  secret: dev_secret_para_tests_que_no_falla_1234567890

---
# ===============================================================
# PERFIL PROD (Oracle Cloud)
# ===============================================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    user: ${DB_USER}
    password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  logging:
    level:
      org.springframework.security: DEBUG
      org.springframework.security.web.access.intercept.FilterSecurityInterceptor: DEBUG