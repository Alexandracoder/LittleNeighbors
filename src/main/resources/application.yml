# ===============================================================
# CONFIGURACIÓN GLOBAL
# ===============================================================
spring:
  jackson:
    mapper:
      default-view-inclusion: true
    deserialization:
      read-unknown-enum-values-as-null: true

jwt:
  expiration: 3600000

app:
  demo-mode: ${APP_DEMO_MODE:false}

---
# ===============================================================
# PERFIL DEV (Local)
# ===============================================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${APP_DB_URL}
    username: ${APP_DB_USERNAME}
    password: ${APP_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:dev_secret_clave_temporal_123}

---
# ===============================================================
# PERFIL PROD (Render/Servidor)
# ===============================================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
  jpa:

    hibernate:
      ddl-auto: none
    properties:
      hibernate:

        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:

    enabled: true

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.security: DEBUG