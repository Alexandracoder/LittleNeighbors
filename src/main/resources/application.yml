# ===============================================================
# CONFIGURACIÓN GLOBAL
# ===============================================================
spring:
  jackson:
    mapper:
      default-view-inclusion: true
    deserialization:
      read-unknown-enum-values-as-null: true

jwt:
  expiration: 3600000

app:
  demo-mode: ${APP_DEMO_MODE:false}

---
# ===============================================================
# PERFIL DEV (Local)
# ===============================================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${APP_DB_URL}
    username: ${APP_DB_USERNAME}
    password: ${APP_DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:dev_secret_clave_temporal_123}

---
# ===============================================================
# PERFIL TEST (GitHub Actions / Local)
# ===============================================================
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/littleneighbors_test?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: testuser
    password: testpassword
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true
    clean-disabled: false
  test:
    database:
      replace: none

# Nota: ALLOWED_ORIGINS suele ser una propiedad personalizada,
# se mueve fuera de 'spring' si no está vinculada a Spring Boot directamente.
ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174

jwt:
  secret: "this-is-a-super-long-and-secure-test-secret-key-must-be-32-bytes"

---
# ===============================================================
# PERFIL PROD (El que usa Railway/Render)
# ===============================================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.security: DEBUG