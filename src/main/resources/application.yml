# ===============================================================
# CONFIGURACIÓN GLOBAL (Aplicable a todos los perfiles)
# ===============================================================
spring:
  jackson:
    mapper:
      default-view-inclusion: true
    deserialization:
      read-unknown-enum-values-as-null: true

jwt:
  expiration: 3600000

app:
  demo-mode: ${APP_DEMO_MODE:true}

  mail:
    from-address: ${APP_MAIL_FROM_ADDRESS}
    frontend-url: ${APP_FRONTEND_URL}

---
# ===============================================================
# PERFIL DEV (Local)
# ===============================================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${APP_DB_URL}
    username: ${APP_DB_USERNAME}
    password: ${APP_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:dev_secret_clave_temporal_123}

---
# ===============================================================
# PERFIL PROD (Render/Servidor)
# ===============================================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_STARTTLS:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000


management:
  health:
    mail:
      enabled: false

# Swagger/OpenAPI solo para dev: en prod no queremos exponer la documentación
# completa de la API (rutas, DTOs, esquemas) a cualquiera.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    root: WARN
    com.alexandracoder: INFO
    org.springframework.security: WARN