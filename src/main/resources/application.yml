# ===============================================================
# CONFIGURACIÓN GLOBAL (Común a todos los perfiles)
# ===============================================================
spring:
  profiles:
    active: dev # Perfil por defecto
  jackson:
    mapper:
      default-view-inclusion: true
    deserialization:
      read-unknown-enum-values-as-null: true

jwt:
  expiration: 3600000

---
# ===============================================================
# PERFIL DEV (MySQL local)
# ===============================================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/littleneighbors_1?createDatabaseIfNotExist=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: MYSQL
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:8f42a6b2d1c5e9f8a3b7c4d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1}

---
# ===============================================================
# PERFIL TEST (MySQL para GitHub Actions / CI)
# ===============================================================
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:mysql://localhost:3306/littleneighbors_test
    username: testuser
    password: testpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    clean-on-validation-error: true

jwt:
  secret: ${JWT_SECRET:test_secret_for_ci_only_1234567890}

---
# ===============================================================
# PERFIL PROD (MySQL Real / Producción)
# ===============================================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/littleneighbors_1?useSSL=true&serverTimezone=UTC}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}