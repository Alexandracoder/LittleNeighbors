name: CI — Full Stack Build & Test

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: Backend — Spring Boot + JUnit 5
  # ───────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: "Backend — Java 21 / Maven"
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: littleneighbors_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent -u root --password=rootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run Backend tests
        env:

          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: mvn -B clean test -Dspring.profiles.active=test

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: Frontend — Vite + Vitest
  # ───────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: "Frontend — Node 20 / Vitest"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # CAMBIO: Busca el lockfile en la subcarpeta
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies

        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm run test -- --run

      - name: Build project
        working-directory: ./frontend
        run: npm run build

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3: Gate — Control de paso final
  # ───────────────────────────────────────────────────────────────────────────
  all-checks-pass:
    name: "All checks passed"
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - name: Success
        run: echo "Backend and frontend tests passed successfully."


        


