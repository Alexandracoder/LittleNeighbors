name: CI — Backend Build & Test

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-tests:
    name: "Backend — Java 21 / Maven"
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: littleneighbors_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent -u root --password=rootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run Backend tests
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

          DB_USER: testuser
          DB_PASSWORD: testpassword
          ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
        run: mvn -B clean test -Dspring.profiles.active=test

